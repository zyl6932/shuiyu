<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>睡阈 · 原型</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'PingFang SC', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* Material Design (Android) motion — emphasized easing */
  .md-fade-through {
    animation: mdFadeThrough 280ms cubic-bezier(0.2, 0, 0, 1.0) both;
    height: 100%; width: 100%;
  }
  @keyframes mdFadeThrough {
    0%   { opacity: 0; transform: scale(0.92); }
    35%  { opacity: 0; }
    100% { opacity: 1; transform: scale(1); }
  }
  .md-shared-z-forward {
    animation: mdSharedZForward 300ms cubic-bezier(0.05, 0.7, 0.1, 1.0) both;
    height: 100%; width: 100%;
  }
  @keyframes mdSharedZForward {
    from { opacity: 0; transform: scale(0.80); }
    to   { opacity: 1; transform: scale(1); }
  }
  .md-shared-x {
    animation: mdSharedX 300ms cubic-bezier(0.2, 0, 0, 1.0) both;
    height: 100%; width: 100%;
  }
  @keyframes mdSharedX {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  ::-webkit-scrollbar { display: none; }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: rgba(20,20,32,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 20px; width: 240px;
    color: #fff; font-size: 13px; backdrop-filter: blur(20px);
  }
  #tweaks-panel h4 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #e8e0ff; }
  #tweaks-panel label { display: block; margin-bottom: 10px; color: rgba(255,255,255,0.7); font-size: 12px; }
  #tweaks-panel select, #tweaks-panel input[type=range] {
    width: 100%; margin-top: 4px; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
    color: #fff; padding: 4px 8px; font-size: 12px;
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <label>配色方案
    <select id="tw-theme" onchange="applyTweak()">
      <option value="indigo">靛蓝 · 默认</option>
      <option value="forest">深林绿</option>
      <option value="rose">玫瑰暮色</option>
    </select>
  </label>
  <label>用户画像
    <select id="tw-persona" onchange="applyTweak()">
      <option value="C">C · 数据好奇型</option>
      <option value="A">A · 手机依赖型</option>
      <option value="B">B · 环境困扰型</option>
    </select>
  </label>
  <label>睡眠评分
    <input type="range" id="tw-score" min="40" max="100" value="78" oninput="applyTweak()"/>
    <span id="tw-score-val">78</span>
  </label>
</div>

<script>
  const THEMES = {
    indigo: { accent: '#7c6ef2', accentSoft: 'rgba(124,110,242,0.18)', bg: '#0f0f1e', card: '#1a1a2e', sub: '#252540' },
    forest: { accent: '#4eb87a', accentSoft: 'rgba(78,184,122,0.18)', bg: '#0d1a14', card: '#162110', sub: '#1e2e1e' },
    rose:   { accent: '#d97070', accentSoft: 'rgba(217,112,112,0.18)', bg: '#1a0f14', card: '#261520', sub: '#321c28' },
  };
  let currentTheme = THEMES.indigo;

  function applyTweak() {
    const t = document.getElementById('tw-theme').value;
    currentTheme = THEMES[t];
    const score = +document.getElementById('tw-score').value;
    document.getElementById('tw-score-val').textContent = score;
    window.__tweakState = { theme: currentTheme, score, persona: document.getElementById('tw-persona').value };
    window.dispatchEvent(new CustomEvent('tweakChange', { detail: window.__tweakState }));
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ theme:t, score, persona: document.getElementById('tw-persona').value } }, '*');
  }

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode') { document.getElementById('tweaks-panel').style.display = 'block'; }
    if (e.data?.type === '__deactivate_edit_mode') { document.getElementById('tweaks-panel').style.display = 'none'; }
  });
  window.parent.postMessage({ type:'__edit_mode_available' }, '*');
  window.__tweakState = { theme: currentTheme, score: 78, persona: 'C' };
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Color tokens ──────────────────────────────────────────────
function useTheme() {
  const [theme, setTheme] = useState(window.__tweakState?.theme || THEMES.indigo);
  useEffect(() => {
    const h = e => setTheme(e.detail.theme);
    window.addEventListener('tweakChange', h);
    return () => window.removeEventListener('tweakChange', h);
  }, []);
  return theme;
}

// ── iOS Navigation Bar ────────────────────────────────────────
function IOSNavHeader({ title, backLabel = '返回', onBack, rightLabel, onRight, bgColor = '#0f0f1e' }) {
  const BLUE = '#3478f6';
  return (
    <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:30, paddingTop:60, background:bgColor }}>
      <div style={{ height:44, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', paddingLeft:8, paddingRight:8 }}>
        {onBack && (
          <button onClick={onBack} style={{
            position:'absolute', left:8, top:0, bottom:0,
            display:'flex', alignItems:'center', gap:3,
            background:'transparent', border:'none', cursor:'pointer',
            color:BLUE, fontFamily:'-apple-system,"PingFang SC",system-ui',
            fontSize:17, fontWeight:400, padding:'0 8px',
            whiteSpace:'nowrap', WebkitTapHighlightColor:'transparent',
          }}
            onMouseDown={e=>e.currentTarget.style.opacity='0.5'}
            onMouseUp={e=>e.currentTarget.style.opacity='1'}
            onTouchStart={e=>e.currentTarget.style.opacity='0.5'}
            onTouchEnd={e=>e.currentTarget.style.opacity='1'}
          >
            <svg width="11" height="19" viewBox="0 0 11 19" fill="none">
              <path d="M9.5 1.5L1.5 9.5l8 8" stroke={BLUE} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <span>{backLabel}</span>
          </button>
        )}
        <span style={{ color:'#fff', fontSize:17, fontWeight:600, fontFamily:'-apple-system,"PingFang SC",system-ui', letterSpacing:-0.4, maxWidth:'55%', textAlign:'center', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{title}</span>
        {rightLabel && (
          <button onClick={onRight} style={{ position:'absolute', right:16, top:0, bottom:0, background:'transparent', border:'none', cursor:'pointer', color:BLUE, fontSize:17, fontWeight:400, fontFamily:'-apple-system,"PingFang SC",system-ui', padding:'0 4px', whiteSpace:'nowrap' }}>{rightLabel}</button>
        )}
      </div>
      <div style={{ height:0.5, background:'rgba(255,255,255,0.1)' }}/>
    </div>
  );
}

// ── Tab Bar ───────────────────────────────────────────────────
function TabBar({ tab, setTab }) {
  const theme = useTheme();
  const tabs = [
    { id:'home', label:'今日', icon:(active)=>(
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">

// ── Shared components ─────────────────────────────────────────
function Btn({ children, onClick, variant='primary', style={} }) {
  const theme = useTheme();
  const base = {
    display:'block', width:'100%', padding:'15px 0', borderRadius:14,
    border:'none', cursor:'pointer', fontSize:17, fontWeight:600,
    fontFamily:'-apple-system,"PingFang SC",system-ui',
    transition:'opacity 0.15s', WebkitTapHighlightColor:'transparent',
    ...style,
  };
  if (variant==='primary') return (
    <button onClick={onClick} style={{ ...base, background:theme.accent, color:'#fff' }}
      onMouseDown={e=>e.currentTarget.style.opacity='0.8'}
      onMouseUp={e=>e.currentTarget.style.opacity='1'}
      onTouchStart={e=>e.currentTarget.style.opacity='0.8'}
      onTouchEnd={e=>e.currentTarget.style.opacity='1'}
    >{children}</button>
  );
  if (variant==='ghost') return (
    <button onClick={onClick} style={{ ...base, background:'transparent', color:'rgba(255,255,255,0.5)', fontSize:15 }}>{children}</button>
  );
  if (variant==='outline') return (
    <button onClick={onClick} style={{ ...base, background:'rgba(255,255,255,0.06)', color:'rgba(255,255,255,0.9)', border:'1px solid rgba(255,255,255,0.12)' }}>{children}</button>
  );
}

function Tag({ children, color }) {
  return <span style={{ fontSize:11, fontWeight:600, padding:'3px 8px', borderRadius:20, background:color+'22', color, letterSpacing:0.5 }}>{children}</span>;
}

    {from:0.62,to:0.72,y:40,color:'#7c8ef2'},

    {from:0.78,to:0.88,y:40,color:'#7c8ef2'},
    {from:0.88,to:0.95,y:20,color:'#e8a84a'},
    {from:0.95,to:1.0,y:10,color:'#d97070'},
  ];
  const W=300, H=90;
  const points = segs.map(s=>`${s.from*W},${s.y}`).join(' ') + ` ${W},${segs[segs.length-1].y}`;

}

// ── MAIN APP ──────────────────────────────────────────────────
const SCREENS = ['onboarding','device','home','detail','suggestion','week'];

function App() {
  const saved = localStorage.getItem('shuiyu_screen') || 'home';
  const [tab, setTab] = useState(['home','week','guide'].includes(saved) ? saved : 'home');
  const [overlay, setOverlay] = useState(null); // 'detail' | 'suggestion'
  const [persona, setPersona] = useState('C');
  const [score, setScore] = useState(78);

  useEffect(()=>{ localStorage.setItem('shuiyu_screen', tab); },[tab]);

  useEffect(()=>{
    const h = e => { setPersona(e.detail.persona); setScore(e.detail.score); };
    window.addEventListener('tweakChange', h);
    return ()=>window.removeEventListener('tweakChange', h);
  },[]);

  return (
    <IOSDevice dark width={390} height={844}>
      <div style={{ height:'100%', position:'relative' }}>
        {/* Tab content — Material fade-through on tab switch */}
        {!overlay && (
          <div key={tab} className="md-fade-through">
            {tab==='home'  && <HomeScreen onDetail={()=>setOverlay('detail')} onSugg={()=>setOverlay('suggestion')} onWeek={()=>setTab('week')} persona={persona} score={score}/>}
            {tab==='week'  && <WeekScreen onBack={()=>setTab('home')}/>}
            {tab==='guide' && <GuideScreen onStartOnboarding={()=>{}} onStartDevice={()=>{}}/>}
          </div>
        )}

        {/* Overlays — Material shared Z-axis on forward push */}
        {overlay && (
          <div key={overlay} className="md-shared-z-forward" style={{ position:'absolute', inset:0 }}>
            {overlay==='detail'     && <DetailScreen onBack={()=>setOverlay(null)} persona={persona}/>}
            {overlay==='suggestion' && <SuggestionScreen onBack={()=>setOverlay(null)} onConfirm={()=>setOverlay(null)} persona={persona}/>}
          </div>
        )}

        {/* Tab bar — hidden when overlay is active */}
        {!overlay && <TabBar tab={tab} setTab={setTab}/>}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
